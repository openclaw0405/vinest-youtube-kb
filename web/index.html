<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINEST YouTube 投資知識庫</title>
  <link rel="stylesheet" href="styles.css?v=21">
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="index.html">🧠 VINEST 投資知識庫</a></h1>
      <nav>
        <a href="index.html" class="active">首頁</a>
        <a href="library.html">知識庫</a>
        <a href="#" onclick="openAddModal()">新增筆記</a>
      </nav>
    </header>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋公司、行業、主題、關鍵詞..." oninput="handleSearch()">
      <select id="typeFilter" onchange="handleSearch()">
        <option value="">全部類型</option>
        <option value="youtube">YouTube</option>
        <option value="note">筆記</option>
        <option value="report">報告</option>
            <option value="pdf">PDF</option>
      </select>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <label>總筆記數</label>
        <strong id="kpiTotal">-</strong>
      </div>
      <div class="kpi-card">
        <label>公司數</label>
        <strong id="kpiCompanies">-</strong>
      </div>
      <div class="kpi-card">
        <label>行業數</label>
        <strong id="kpiSectors">-</strong>
      </div>
      <div class="kpi-card">
        <label>主題數</label>
        <strong id="kpiThemes">-</strong>
      </div>
    </div>

    <!-- Recent Entries -->
    <section class="section">
      <h2>📝 最近新增</h2>
      <div class="card-grid" id="recentGrid"></div>
    </section>

    <!-- Top Companies -->
    <section class="section">
      <h2>🏢 熱門公司</h2>
      <div class="card-grid" id="companyGrid"></div>
    </section>

    <!-- Top Sectors -->
    <section class="section">
      <h2>📊 熱門行業</h2>
      <div class="card-grid" id="sectorGrid"></div>
    </section>

    <!-- Top Themes -->
    <section class="section">
      <h2>🎯 熱門主題</h2>
      <div class="card-grid" id="themeGrid"></div>
    </section>
  </div>

  <!-- Add Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2>➕ 新增知識筆記</h2>
      <form id="addForm" onsubmit="handleAdd(event)">
        <div class="form-group">
          <label>標題 *</label>
          <input type="text" name="title" required>
        </div>
        <div class="form-group">
          <label>來源名稱</label>
          <input type="text" name="source_name" placeholder="例如：YouTube 頻道名">
        </div>
        <div class="form-group">
          <label>來源 URL</label>
          <input type="url" name="source_url" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>來源類型</label>
          <select name="source_type">
            <option value="youtube">YouTube</option>
            <option value="note">筆記</option>
            <option value="report">報告</option>
            <option value="pdf">PDF</option>
          </select>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" name="date" id="dateInput">
        </div>
        <div class="form-group">
          <label>簡短摘要 (140字以內)</label>
          <textarea name="summary_short" rows="2" placeholder="一句話總結核心觀點"></textarea>
        </div>
        <div class="form-group">
          <label>詳細摘要</label>
          <textarea name="summary_long" rows="4" placeholder="完整描述"></textarea>
        </div>
        <div class="form-group">
          <label>公司 (逗號分隔)</label>
          <input type="text" name="companies" placeholder="Tesla, NVIDIA">
        </div>
        <div class="form-group">
          <label>行業 (逗號分隔)</label>
          <input type="text" name="sectors" placeholder="科技, 半導體">
        </div>
        <div class="form-group">
          <label>主題 (逗號分隔)</label>
          <input type="text" name="themes" placeholder="AI, 估值">
        </div>
        <div class="form-group">
          <label>看好論點 (每行一點)</label>
          <textarea name="bull_points" rows="3" placeholder="支持投資既論點"></textarea>
        </div>
        <div class="form-group">
          <label>看淡論點 (每行一點)</label>
          <textarea name="bear_points" rows="3" placeholder="反對投資既論點"></textarea>
        </div>
        <div class="form-group">
          <label>催化劑 (每行一點)</label>
          <textarea name="catalysts" rows="2" placeholder="可能觸發股價上升既因素"></textarea>
        </div>
        <div class="form-group">
          <label>風險 (每行一點)</label>
          <textarea name="risks" rows="2" placeholder="潛在風險"></textarea>
        </div>
        <div class="form-group">
          <label>個人備註</label>
          <textarea name="notes" rows="2" placeholder="自己既睇法、跟進事項"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button>
          <button type="submit" class="btn">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.v22.js"></script>
  <script>
    // Set default date
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

    async function init() {
      const data = await loadData();
      
      // KPI
      const counts = VINEST.getEntityCounts(data.entries);
      document.getElementById('kpiTotal').textContent = data.entries.length;
      document.getElementById('kpiCompanies').textContent = counts.companies;
      document.getElementById('kpiSectors').textContent = counts.sectors;
      document.getElementById('kpiThemes').textContent = counts.themes;

      // Recent entries
      const recent = VINEST.sortEntries(data.entries, 'date').slice(0, 6);
      document.getElementById('recentGrid').innerHTML = recent.map(e => VINEST.entryCardHTML(e)).join('');

      // Top companies
      const topCompanies = VINEST.getTopEntities(data.entries, 'companies', 6);
      document.getElementById('companyGrid').innerHTML = topCompanies.map(c => 
        VINEST.entityCardHTML(c.name, c.count, `company.html?company=${encodeURIComponent(c.name)}`)
      ).join('');

      // Top sectors
      const topSectors = VINEST.getTopEntities(data.entries, 'sectors', 6);
      document.getElementById('sectorGrid').innerHTML = topSectors.map(s => 
        VINEST.entityCardHTML(s.name, s.count, `sector.html?sector=${encodeURIComponent(s.name)}`)
      ).join('');

      // Top themes
      const topThemes = VINEST.getTopEntities(data.entries, 'themes', 6);
      document.getElementById('themeGrid').innerHTML = topThemes.map(t => 
        VINEST.entityCardHTML(t.name, t.count, `theme.html?theme=${encodeURIComponent(t.name)}`)
      ).join('');
    }

    function handleSearch() {
      const q = document.getElementById('searchInput').value;
      const type = document.getElementById('typeFilter').value;
      window.location.href = `library.html?q=${encodeURIComponent(q)}&type=${type}`;
    }

    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
    }
    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
    }

    async function handleAdd(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      
      const entry = {
        id: 'ent-' + Date.now(),
        title: formData.get('title'),
        source_name: formData.get('source_name'),
        source_url: formData.get('source_url'),
        source_type: formData.get('source_type'),
        date: formData.get('date'),
        summary_short: formData.get('summary_short'),
        summary_long: formData.get('summary_long'),
        companies: formData.get('companies') ? formData.get('companies').split(',').map(s => s.trim()).filter(Boolean) : [],
        sectors: formData.get('sectors') ? formData.get('sectors').split(',').map(s => s.trim()).filter(Boolean) : [],
        themes: formData.get('themes') ? formData.get('themes').split(',').map(s => s.trim()).filter(Boolean) : [],
        bull_points: formData.get('bull_points') ? formData.get('bull_points').split('\n').map(s => s.trim()).filter(Boolean) : [],
        bear_points: formData.get('bear_points') ? formData.get('bear_points').split('\n').map(s => s.trim()).filter(Boolean) : [],
        catalysts: formData.get('catalysts') ? formData.get('catalysts').split('\n').map(s => s.trim()).filter(Boolean) : [],
        risks: formData.get('risks') ? formData.get('risks').split('\n').map(s => s.trim()).filter(Boolean) : [],
        notes: formData.get('notes'),
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };

      // Save to localStorage (MVP)
      const key = 'vinest-kb-entries';
      const existing = JSON.parse(localStorage.getItem(key) || '[]');
      existing.unshift(entry);
      localStorage.setItem(key, JSON.stringify(existing));

      closeAddModal();
      alert('已儲存！');
      init();
    }

    init();
  </script>
</body>
</html>
