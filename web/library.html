<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知識庫 - VINEST</title>
  <link rel="stylesheet" href="styles.css?v=21">
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="index.html">🧠 VINEST 投資知識庫</a></h1>
      <nav>
        <a href="index.html">首頁</a>
        <a href="library.html" class="active">知識庫</a>
        <a href="#" onclick="openAddModal()">新增筆記</a>
      </nav>
    </header>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋公司、行業、主題、關鍵詞..." oninput="handleSearch()">
      <select id="companyFilter" onchange="handleSearch()">
        <option value="">全部公司</option>
      </select>
      <select id="sectorFilter" onchange="handleSearch()">
        <option value="">全部行業</option>
      </select>
      <select id="themeFilter" onchange="handleSearch()">
        <option value="">全部主題</option>
      </select>
      <select id="typeFilter" onchange="handleSearch()">
        <option value="">全部類型</option>
        <option value="youtube">YouTube</option>
        <option value="pdf">PDF</option>
        <option value="report">報告</option>
        <option value="note">筆記</option>
      </select>
      <select id="sortFilter" onchange="handleSearch()">
        <option value="date">最新日期</option>
        <option value="updated">最近更新</option>
      </select>
    </div>

    <div class="section">
      <div class="card-grid" id="entriesGrid"></div>
    </div>
  </div>

  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2>➕ 新增知識筆記</h2>
      <form id="addForm" onsubmit="handleAdd(event)">
        <div class="form-group">
          <label>標題 *</label>
          <input type="text" name="title" required>
        </div>
        <div class="form-group">
          <label>來源名稱</label>
          <input type="text" name="source_name" placeholder="例如：YouTube 頻道名">
        </div>
        <div class="form-group">
          <label>來源 URL</label>
          <input type="url" name="source_url" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>來源類型</label>
          <select name="source_type">
            <option value="youtube">YouTube</option>
            <option value="note">筆記</option>
            <option value="report">報告</option>
            <option value="pdf">PDF</option>
          </select>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" name="date" id="dateInput">
        </div>
        <div class="form-group">
          <label>簡短摘要 (140字以內)</label>
          <textarea name="summary_short" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>詳細摘要</label>
          <textarea name="summary_long" rows="4"></textarea>
        </div>
        <div class="form-group">
          <label>公司 (逗號分隔)</label>
          <input type="text" name="companies" placeholder="Tesla, NVIDIA">
        </div>
        <div class="form-group">
          <label>行業 (逗號分隔)</label>
          <input type="text" name="sectors" placeholder="科技, 半導體">
        </div>
        <div class="form-group">
          <label>主題 (逗號分隔)</label>
          <input type="text" name="themes" placeholder="AI, 估值">
        </div>
        <div class="form-group">
          <label>看好論點 (每行一點)</label>
          <textarea name="bull_points" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>看淡論點 (每行一點)</label>
          <textarea name="bear_points" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>催化劑 (每行一點)</label>
          <textarea name="catalysts" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>風險 (每行一點)</label>
          <textarea name="risks" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>個人備註</label>
          <textarea name="notes" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button>
          <button type="submit" class="btn">儲存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.v22.js"></script>
  <script>
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

    async function init() {
      const data = await loadData();
      const params = getParams();

      // Populate filters
      const companies = [...new Set(data.entries.flatMap(e => e.companies || []))].sort();
      const sectors = [...new Set(data.entries.flatMap(e => e.sectors || []))].sort();
      const themes = [...new Set(data.entries.flatMap(e => e.themes || []))].sort();

      document.getElementById('companyFilter').innerHTML = '<option value="">全部公司</option>' + 
        companies.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      document.getElementById('sectorFilter').innerHTML = '<option value="">全部行業</option>' + 
        sectors.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
      document.getElementById('themeFilter').innerHTML = '<option value="">全部主題</option>' + 
        themes.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');

      // Set filter values from URL
      if (params.search) document.getElementById('searchInput').value = params.search;
      if (params.company) document.getElementById('companyFilter').value = params.company;
      if (params.sector) document.getElementById('sectorFilter').value = params.sector;
      if (params.theme) document.getElementById('themeFilter').value = params.theme;
      if (params.type) document.getElementById('typeFilter').value = params.type;

      renderEntries();
    }

    async function renderEntries() {
      const data = await loadData(); // cached
      const params = getParams();
      
      let entries = data.entries || [];
      
      // Apply filters
      if (params.search) {
        entries = searchEntries(entries, params.search);
      }
      entries = filterEntries(entries, {
        company: document.getElementById('companyFilter').value,
        sector: document.getElementById('sectorFilter').value,
        theme: document.getElementById('themeFilter').value,
        source: new URLSearchParams(window.location.search).get('type') || ''
      });
      entries = sortEntries(entries, document.getElementById('sortFilter').value);

      const grid = document.getElementById('entriesGrid');
      if (entries.length === 0) {
        grid.innerHTML = '<div class="empty-state">暫無筆記</div>';
      } else {
        grid.innerHTML = entries.map(e => VINEST.entryCardHTML(e)).join('');
      }
    }

    function handleSearch() {
      const q = document.getElementById('searchInput').value;
      const company = document.getElementById('companyFilter').value;
      const sector = document.getElementById('sectorFilter').value;
      const theme = document.getElementById('themeFilter').value;
      const type = document.getElementById('typeFilter').value;
      const sort = document.getElementById('sortFilter').value;
      
      const url = new URL(window.location.href);
      url.searchParams.set('q', q);
      // Always set filters (empty string removes param)
      url.searchParams.set('company', company);
      url.searchParams.set('sector', sector);
      url.searchParams.set('theme', theme);
      url.searchParams.set('type', type);
      url.searchParams.set('sort', sort);
      window.location.href = url.toString();
    }

    function openAddModal() {
      document.getElementById('addModal').classList.add('active');
    }
    function closeAddModal() {
      document.getElementById('addModal').classList.remove('active');
    }

    async function handleAdd(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      
      const entry = {
        id: 'ent-' + Date.now(),
        title: formData.get('title'),
        source_name: formData.get('source_name'),
        source_url: formData.get('source_url'),
        source_type: formData.get('source_type'),
        date: formData.get('date'),
        summary_short: formData.get('summary_short'),
        summary_long: formData.get('summary_long'),
        companies: formData.get('companies') ? formData.get('companies').split(',').map(s => s.trim()).filter(Boolean) : [],
        sectors: formData.get('sectors') ? formData.get('sectors').split(',').map(s => s.trim()).filter(Boolean) : [],
        themes: formData.get('themes') ? formData.get('themes').split(',').map(s => s.trim()).filter(Boolean) : [],
        bull_points: formData.get('bull_points') ? formData.get('bull_points').split('\n').map(s => s.trim()).filter(Boolean) : [],
        bear_points: formData.get('bear_points') ? formData.get('bear_points').split('\n').map(s => s.trim()).filter(Boolean) : [],
        catalysts: formData.get('catalysts') ? formData.get('catalysts').split('\n').map(s => s.trim()).filter(Boolean) : [],
        risks: formData.get('risks') ? formData.get('risks').split('\n').map(s => s.trim()).filter(Boolean) : [],
        notes: formData.get('notes'),
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };

      const key = 'vinest-kb-entries';
      const existing = JSON.parse(localStorage.getItem(key) || '[]');
      existing.unshift(entry);
      localStorage.setItem(key, JSON.stringify(existing));

      closeAddModal();
      alert('已儲存！');
      window.location.reload();
    }

    init();
  </script>
</body>
</html>
